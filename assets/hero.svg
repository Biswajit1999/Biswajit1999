<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="410" viewBox="0 0 1400 410">

<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#020617"/>
    <stop offset=".42" stop-color="#0f172a"/>
    <stop offset=".72" stop-color="#1e1b4b"/>
    <stop offset="1" stop-color="#083344"/>
  </linearGradient>
  <linearGradient id="name" x1="0" x2="1">
