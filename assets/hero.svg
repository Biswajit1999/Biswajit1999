<text x="82" y="168" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="600" fill="#cbd5e1">ASTROPHYSICS RESEARCHER  ·  INSTRUMENTATION ENGINEER</text>
