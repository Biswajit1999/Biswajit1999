<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="480" viewBox="0 0 1400 480">

<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#020617"/>
    <stop offset=".50" stop-color="#0f172a"/>
    <stop offset=".78" stop-color="#1e1b4b"/>
    <stop offset="1" stop-color="#083344"/>
  </linearGradient>
  <linearGradient id="title" x1="0" x2="1">
    <stop offset="0" stop-color="#ffffff"/>
    <stop offset=".45" stop-color="#67e8f9"/>
    <stop offset=".78" stop-color="#a78bfa"/>
    <stop offset="1" stop-color="#f8fafc"/>
  </linearGradient>
  <linearGradient id="spec" x1="0" x2="1">
    <stop offset="0" stop-color="#60a5fa"/>
    <stop offset=".25" stop-color="#22d3ee"/>
    <stop offset=".50" stop-color="#34d399"/>
    <stop offset=".72" stop-color="#facc15"/>
    <stop offset="1" stop-color="#fb7185"/>
  </linearGradient>
  <radialGradient id="planet" cx=".32" cy=".28" r=".74">
    <stop offset="0" stop-color="#dbeafe"/>
    <stop offset=".18" stop-color="#60a5fa"/>
    <stop offset=".56" stop-color="#312e81"/>
    <stop offset="1" stop-color="#020617"/>
  </radialGradient>
  <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
    <path d="M34 0H0V34" fill="none" stroke="#38bdf8" stroke-opacity=".045"/>
  </pattern>
  <filter id="glow">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<rect width="1400" height="480" rx="30" fill="url(#bg)"/>
<rect width="1400" height="480" rx="30" fill="url(#grid)"/>
<g fill="#e0f2fe">
  <circle cx="72" cy="62" r="1.5"/><circle cx="212" cy="98" r="1.2"/>
  <circle cx="390" cy="48" r="1.2"/><circle cx="610" cy="76" r="1"/>
  <circle cx="812" cy="52" r="1.5"/><circle cx="942" cy="94" r="1"/>
  <circle cx="1160" cy="50" r="1.4"/><circle cx="1304" cy="112" r="1"/>
  <circle cx="1020" cy="270" r="1.2"/><circle cx="1260" cy="370" r="1.2"/>
</g>
<circle cx="1190" cy="238" r="158" fill="url(#planet)"/>
<ellipse cx="1190" cy="238" rx="230" ry="70" fill="none" stroke="#67e8f9" stroke-opacity=".30" stroke-width="2" transform="rotate(-18 1190 238)"/>
<ellipse cx="1190" cy="238" rx="265" ry="91" fill="none" stroke="#a78bfa" stroke-opacity=".18" transform="rotate(-18 1190 238)"/>
<circle cx="1082" cy="298" r="41" fill="#020617" stroke="#93c5fd" stroke-opacity=".50"/>

<path d="M690 246 C744 220 772 272 820 240 S892 192 940 238 S1000 278 1040 244"
      fill="none" stroke="url(#spec)" stroke-width="4" filter="url(#glow)"/>
<g stroke="url(#spec)" stroke-opacity=".65">
  <path d="M716 190V302"/><path d="M760 212V278"/><path d="M810 172V322"/>
  <path d="M855 204V288"/><path d="M900 158V334"/><path d="M950 202V286"/>
  <path d="M994 184V306"/>
</g>

<text x="78" y="132" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="74" font-weight="800" fill="url(#title)">Biswajit Jana</text>
<text x="82" y="186" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="26" font-weight="700" fill="#dbeafe">ASTROPHYSICS RESEARCHER  ·  INSTRUMENTATION ENGINEER</text>
<rect x="82" y="228" width="6" height="98" rx="3" fill="url(#spec)"/>
<text x="110" y="258" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" fill="#f1f5f9">Building precision spectroscopy, adaptive optics and scientific</text>
<text x="110" y="291" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" fill="#f1f5f9">computing tools for astrophysical instrumentation.</text>

<g font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700">
  <rect x="82" y="374" width="196" height="48" rx="24" fill="#0f172a" stroke="#22d3ee" stroke-opacity=".8"/>
  <circle cx="108" cy="398" r="7" fill="#34d399"/>
  <text x="128" y="404" fill="#e0f2fe">Open to collaborate</text>

  <rect x="296" y="374" width="232" height="48" rx="24" fill="#0f172a" stroke="#a78bfa" stroke-opacity=".8"/>
  <text x="326" y="404" fill="#ede9fe">Precision instrumentation</text>
</g>

</svg>